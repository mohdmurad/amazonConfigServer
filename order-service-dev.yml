

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/microservices
    username: root
    password: murad@Kasif1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  zipkin:
    base-url: http://localhost:9411   # changed from host.docker.internal
    enabled: true

  sleuth:
    sampler:
      probability: 1.0
    propagation-keys:
      - b3
      - X-B3-TraceId
      - X-B3-SpanId
      - X-B3-ParentSpanId
      - X-B3-Sampled
      - X-B3-Flags

